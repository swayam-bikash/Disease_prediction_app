<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-fullscreen">

<div class="login-center">
    <div class="login-glass">
        <div class="login-icon">🧾</div>
        <h1 class="login-title">Create Account</h1>
        <p class="login-subtitle">Sign up to get started</p>

        {% if error %}
        <p class="error-msg">⚠️ {{ error }}</p>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="glass-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="password" name="password" class="glass-input" placeholder="••••••••" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="confirm_password" name="confirm_password" class="glass-input" placeholder="••••••••" required>
                    <button type="button" class="toggle-btn" onclick="toggleConfirm()">👁️</button>
                </div>
                <p id="matchError" class="match-error">⚠️ Passwords do not match</p>
            </div>
            <button type="submit" class="submit-btn" onclick="return validateForm()">Create Account</button>
        </form>

        <a href="/login" class="alt-link">Already have an account? Login</a>
    </div>
</div>

<script>
function togglePassword() { let p = document.getElementById("password"); p.type = p.type === "password" ? "text" : "password"; }
function toggleConfirm() { let p = document.getElementById("confirm_password"); p.type = p.type === "password" ? "text" : "password"; }
function validateForm() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm_password").value;
    let err = document.getElementById("matchError");
    if (pass !== confirm) { err.style.display = "block"; return false; }
    err.style.display = "none";
    return true;
}
</script>
</body>
</html>
