<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-fullscreen">

<div class="login-center">
    <div class="login-glass">
        <div class="login-icon">🩺</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Login to continue</p>

        {% if error %}
        <p class="error-msg">⚠️ {{ error }}</p>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="glass-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="password" name="password" class="glass-input" placeholder="••••••••" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <a href="/signup" class="alt-link">✨ Create New Account</a>
    </div>
</div>

<script>
function togglePassword() {
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
