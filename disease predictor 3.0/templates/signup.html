<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-wrap">

    <!-- LEFT IMAGE PANEL -->
    <div class="login-image" style="background-image: url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=900&q=80');">
        <div class="login-image-text">
            <h2>Start Your Health Journey</h2>
            <p>Create an account and get AI-powered insights about your health today.</p>
        </div>
    </div>

    <!-- RIGHT FORM PANEL -->
    <div class="login-form-side">
        <div class="login-box">

            <div style="font-size:36px; margin-bottom:10px;">🧾</div>
            <h1>Create Account</h1>
            <p class="subtitle">Sign up to get started</p>

            {% if error %}
            <p style="color:#ff4d4d; background:rgba(255,77,77,0.12); padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:15px; border-left:3px solid #ff4d4d;">
                ⚠️ {{ error }}
            </p>
            {% endif %}

            <form action="/signup" method="POST">

                <div style="margin-bottom:16px;">
                    <label style="font-size:13px; opacity:0.75; display:block; margin-bottom:6px;">Email</label>
                    <input type="email" name="email" class="search-input" style="margin-bottom:0;" placeholder="you@example.com" required>
                </div>

                <div style="margin-bottom:16px;">
                    <label style="font-size:13px; opacity:0.75; display:block; margin-bottom:6px;">Password</label>
                    <div style="display:flex; gap:8px;">
                        <input type="password" id="password" name="password" class="search-input" style="margin-bottom:0;" placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword()" style="padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; cursor:pointer;">👁️</button>
                    </div>
                </div>

                <div style="margin-bottom:8px;">
                    <label style="font-size:13px; opacity:0.75; display:block; margin-bottom:6px;">Confirm Password</label>
                    <div style="display:flex; gap:8px;">
                        <input type="password" id="confirm_password" name="confirm_password" class="search-input" style="margin-bottom:0;" placeholder="••••••••" required>
                        <button type="button" onclick="toggleConfirm()" style="padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; cursor:pointer;">👁️</button>
                    </div>
                    <p id="matchError" style="color:#ff4d4d; font-size:12px; margin-top:5px; display:none;">⚠️ Passwords do not match</p>
                </div>

                <button type="submit" onclick="return validateForm()" style="margin-top:22px; display:block; width:100%; padding:13px; border-radius:30px; border:none; background:linear-gradient(135deg,#ff4081,#ff7043); color:white; font-weight:bold; cursor:pointer; font-size:15px; box-shadow:0 4px 15px rgba(255,64,129,0.4);">
                    Create Account
                </button>

            </form>

            <a href="/login" style="display:block; text-align:center; margin-top:14px; padding:13px; border-radius:30px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:white; font-weight:bold; text-decoration:none; font-size:14px;">
                Already have an account? Login
            </a>

        </div>
    </div>

</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
function toggleConfirm() {
    let pass = document.getElementById("confirm_password");
    pass.type = pass.type === "password" ? "text" : "password";
}
function validateForm() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm_password").value;
    let err = document.getElementById("matchError");
    if (pass !== confirm) { err.style.display = "block"; return false; }
    err.style.display = "none";
    return true;
}
</script>
</body>
</html>
