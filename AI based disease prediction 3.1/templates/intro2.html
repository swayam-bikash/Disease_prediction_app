<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
            transition: opacity 0.8s ease;
        }

        .skip-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 10px 22px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
            z-index: 10;
        }

        .skip-btn:hover { background: rgba(255,255,255,0.25); }

        /* symptoms page fades in on top */
        #symptomsFrame {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 5;
            pointer-events: none;
        }

        #symptomsFrame.visible {
            opacity: 1;
            pointer-events: all;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <video id="introVideo" autoplay playsinline>
        <source src="{{ url_for('static', filename='a2.mp4') }}" type="video/mp4">
    </video>

    <button class="skip-btn" id="skipBtn" onclick="fadeToSymptoms()">Skip ›</button>

    <iframe id="symptomsFrame" src="/symptoms"></iframe>

    <script>
        var vid = document.getElementById("introVideo");

        function fadeToSymptoms() {
            document.getElementById("skipBtn").style.display = "none";
            var frame = document.getElementById("symptomsFrame");
            vid.style.opacity = "0";
            frame.classList.add("visible");
            setTimeout(function() {
                window.location.href = "/symptoms";
            }, 1000);
        }

        vid.addEventListener("ended", fadeToSymptoms);

        // Browsers block autoplay with audio — play on first user interaction
        vid.play().catch(function() {
            document.body.addEventListener("click", function() {
                vid.play();
            }, { once: true });
        });
    </script>
</body>
</html>
