<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Disease — {{ disease_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem("theme") || "dark";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1b3e 50%, #0a0a1a 100%);
            color: #e0f0ff;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 32px;
            background: rgba(10, 30, 80, 0.55);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(80, 160, 255, 0.2);
        }
        .navbar-brand { font-size: 18px; font-weight: 700; color: #7dd3fc; }
        .navbar-links { display: flex; align-items: center; gap: 16px; }
        .nav-link {
            font-size: 13px; color: #93c5fd; text-decoration: none;
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid rgba(100,180,255,0.25); transition: all 0.2s;
        }
        .nav-link:hover { background: rgba(100,180,255,0.15); color: #fff; }
        .nav-link.danger { color: #f87171; border-color: rgba(248,113,113,0.3); }
        .nav-link.danger:hover { background: rgba(248,113,113,0.15); }
        .theme-toggle-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
        }
        .glass-panel {
            max-width: 760px;
            margin: 48px auto;
            padding: 40px 44px;
            background: rgba(10, 40, 100, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(100, 180, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(50, 130, 255, 0.15), inset 0 1px 0 rgba(255,255,255,0.08);
            animation: fadeInUp 0.7s ease 0.1s both;
        }
        .panel-title { font-size: 22px; font-weight: 700; color: #bfdbfe; margin-bottom: 6px; }
        .panel-subtitle { font-size: 13px; color: rgba(150,200,255,0.6); margin-bottom: 28px; }
        .form-group { margin-bottom: 22px; }
        label {
            display: block; font-size: 13px; font-weight: 500;
            color: rgba(150,210,255,0.8); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        textarea {
            width: 100%; min-height: 90px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(100,180,255,0.25);
            border-radius: 10px; padding: 12px 14px;
            color: #dbeafe; font-family: 'Poppins', sans-serif;
            font-size: 13px; line-height: 1.6; resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none; border-color: rgba(100,180,255,0.55);
            background: rgba(255,255,255,0.09);
        }
        .btn-row { display: flex; gap: 14px; margin-top: 8px; }
        .btn-save {
            background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
            color: #fff; padding: 10px 28px; border-radius: 20px;
            border: none; cursor: pointer; font-family: 'Poppins', sans-serif;
            font-size: 14px; font-weight: 500; transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.85; }
        .btn-cancel {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(100,180,255,0.25);
            color: #93c5fd; padding: 10px 22px; border-radius: 20px;
            text-decoration: none; font-size: 14px; transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(100,180,255,0.15); }
        footer {
            text-align: center; padding: 20px;
            font-size: 12px; color: rgba(150,200,255,0.35);
        }
        footer a { color: rgba(150,200,255,0.4); }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="navbar-brand">🩺 Admin — Disease Editor</span>
    <div class="navbar-links">
        <a href="/admin" class="nav-link">← Back to Admin</a>
        <a href="/logout" class="nav-link danger">Logout</a>
        <button id="themeToggle" class="theme-toggle-btn" title="Toggle theme">🌙</button>
    </div>
</nav>

<div class="glass-panel">
    <p class="panel-title">✏️ Edit: {{ disease_name }}</p>
    <p class="panel-subtitle">Update the disease information below and save.</p>

    <form method="POST" action="/admin/disease/{{ disease_name | urlencode }}">
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ info.description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="causes">Causes</label>
            <textarea id="causes" name="causes" rows="3">{{ info.causes or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="precautions">Precautions</label>
            <textarea id="precautions" name="precautions" rows="3">{{ info.precautions or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="medicines">Medicines</label>
            <textarea id="medicines" name="medicines" rows="3">{{ info.medicines or '' }}</textarea>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn-save">💾 Save Changes</button>
            <a href="/admin" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

<footer><p>Admin Panel · AI Disease Prediction · <a href="/contact">Contact</a></p></footer>

<script>
(function() {
    var btn = document.getElementById("themeToggle");
    function applyTheme(t) {
        document.documentElement.setAttribute("data-theme", t);
        document.body.setAttribute("data-theme", t);
        btn.textContent = t === "light" ? "🌙" : "☀️";
    }
    applyTheme(localStorage.getItem("theme") || "dark");
    btn.addEventListener("click", function() {
        var next = (localStorage.getItem("theme") || "dark") === "dark" ? "light" : "dark";
        localStorage.setItem("theme", next);
        applyTheme(next);
    });
})();
</script>
</body>
</html>
