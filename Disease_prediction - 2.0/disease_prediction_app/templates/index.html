<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disease Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>🩺 AI Disease Prediction</h2>
</div>

<div class="main-card">
    <h1>Select Your Symptoms</h1>
    <p class="subtitle">Search and select symptoms you are experiencing</p>

    <!-- Search Box -->
    <input
        type="text"
        id="searchBox"
        class="search-input"
        placeholder="Search symptoms (e.g. itching, headache...)"
        onkeyup="filterSymptoms()"
        autocomplete="off"
    >

    <form action="/predict" method="post">
        <div class="symptom-container">
            {% for symptom in symptoms|sort %}
            <label class="symptom-item" data-symptom="{{ symptom }}">
                <input type="checkbox" name="symptoms" value="{{ symptom }}">
                {{ symptom.replace('_', ' ').title() }}
            </label>
            {% endfor %}
        </div>

        <button type="submit" class="predict-btn">Predict Disease</button>
    </form>
</div>

<footer>
    <p>AI-based Medical Assistance | For Educational Use Only</p>
</footer>

<script>
let currentIndex = -1;

function filterSymptoms() {
    const query = document.getElementById("searchBox").value.toLowerCase().trim();
    const items = document.getElementsByClassName("symptom-item");

    currentIndex = -1;

    for (let i = 0; i < items.length; i++) {
        const symptom = items[i].getAttribute("data-symptom").toLowerCase();
        items[i].classList.remove("active");

        if (symptom.startsWith(query)) {
            items[i].style.display = "";
        } else {
            items[i].style.display = "none";
        }
    }
}

document.addEventListener("keydown", function (e) {
    const visibleItems = Array.from(
        document.getElementsByClassName("symptom-item")
    ).filter(item => item.style.display !== "none");

    if (visibleItems.length === 0) return;

    if (e.key === "ArrowDown") {
        e.preventDefault();
        currentIndex = (currentIndex + 1) % visibleItems.length;
        updateActive(visibleItems);
    }

    if (e.key === "ArrowUp") {
        e.preventDefault();
        currentIndex =
            (currentIndex - 1 + visibleItems.length) % visibleItems.length;
        updateActive(visibleItems);
    }

    if (e.key === "Enter" && currentIndex >= 0) {
        e.preventDefault();
        const checkbox = visibleItems[currentIndex].querySelector("input");
        checkbox.checked = !checkbox.checked;
    }
});

function updateActive(items) {
    items.forEach(item => item.classList.remove("active"));

    if (currentIndex >= 0) {
        items[currentIndex].classList.add("active");
        items[currentIndex].scrollIntoView({
            block: "nearest",
            behavior: "smooth"
        });
    }
}
</script>

</body>
</html>
